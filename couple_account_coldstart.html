<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>情侣账号 · 冷启动手册</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --g:       #C0395A;
  --g2:      #D9547A;
  --g3:      #F0A0B8;
  --gd:      #7A1A35;
  --gp:      #FDF0F4;
  --gp2:     #F8D8E4;
  --gold:    #C8973A;
  --goldt:   #FFF3DC;
  --ink:     #111111;
  --ink2:    #444444;
  --ink3:    #888888;
  --ink4:    #BBBBBB;
  --bg:      #FBF5F7;
  --card:    #FFFFFF;
  --border:  #EDD8E0;
  --border2: #DDB8C8;
  --r:       14px;
  --r2:      10px;
  --sh:      0 2px 16px rgba(192,57,90,.07);
  --sh2:     0 4px 24px rgba(192,57,90,.13);
  --red:     #E53935;
  --redp:    #FFEBEE;
  --blue:    #1565C0;
  --bluep:   #E3F2FD;
  --amber:   #E65100;
  --amberp:  #FFF3E0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:90px;font-size:14px;}

nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 12px;cursor:pointer;border:none;background:none;color:var(--ink3);font-family:'Noto Sans SC',sans-serif;font-size:10px;gap:4px;transition:color .15s;-webkit-tap-highlight-color:transparent;}
.nav-item.active{color:var(--g);}
.nav-icon{font-size:22px;line-height:1;}

.page{display:none;padding:0 0 12px;}
.page.active{display:block;}

.page-header{background:var(--g);padding:52px 20px 20px;color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(192,57,90,.25);}
.page-header h1{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:900;letter-spacing:.03em;}
.page-header p{font-size:11px;color:rgba(255,255,255,.6);margin-top:3px;}

.prog-wrap{margin-top:12px;}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.prog-label{font-size:12px;color:rgba(255,255,255,.8);}
.prog-num{font-family:'DM Mono',monospace;font-size:12px;color:#F8C0D0;}
.prog-bar{background:rgba(255,255,255,.2);border-radius:99px;height:5px;overflow:hidden;}
.prog-fill{height:100%;background:#F8C0D0;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}

.section{padding:16px 16px 0;}
.section-title{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.section-title::before{content:'';width:3px;height:14px;background:var(--g);border-radius:2px;}

.card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.card+.card{margin-top:10px;}

/* PAGE 1 */
.today-banner{margin:12px 16px 0;background:linear-gradient(135deg,var(--g),var(--g2));border-radius:var(--r);padding:12px 14px;color:#fff;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh2);}
.today-banner-left{flex:1;}
.today-banner-title{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:700;}
.today-banner-sub{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px;}
.today-banner-count{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;background:rgba(255,255,255,.2);border-radius:8px;padding:6px 12px;text-align:center;}
.today-banner-count small{display:block;font-size:9px;font-weight:400;opacity:.8;}

.filter-scroll{display:flex;gap:7px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:110px;z-index:90;box-shadow:var(--sh);}
.filter-scroll::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:5px 12px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);color:var(--ink2);font-size:11px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.chip.active{background:var(--g);border-color:var(--g);color:#fff;font-weight:500;}

.loc-group{margin:12px 16px 0;}
.loc-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;user-select:none;transition:all .15s;box-shadow:var(--sh);}
.loc-head.open{border-color:var(--g);background:var(--gp);}
.loc-icon2{width:34px;height:34px;border-radius:8px;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.loc-info{flex:1;min-width:0;}
.loc-name{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:700;}
.loc-sub{font-size:10px;color:var(--ink3);margin-top:1px;}
.loc-badge{font-family:'DM Mono',monospace;font-size:10px;background:var(--gp);color:var(--g);padding:3px 8px;border-radius:99px;border:1px solid rgba(192,57,90,.2);white-space:nowrap;flex-shrink:0;}
.loc-arr{font-size:11px;color:var(--ink4);transition:transform .2s;flex-shrink:0;}
.loc-head.open .loc-arr{transform:rotate(90deg);}

.shots-list{display:none;flex-direction:column;gap:8px;padding:8px 0;}
.shots-list.open{display:flex;}

.shot-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:border-color .15s;box-shadow:var(--sh);}
.shot-card.done{border-color:var(--g2);background:var(--gp);}
.shot-head{display:flex;align-items:flex-start;gap:10px;padding:12px;cursor:pointer;}
.cb{width:20px;height:20px;border-radius:5px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s;background:var(--card);cursor:pointer;}
.shot-card.done .cb{background:var(--g);border-color:var(--g);}
.cb svg{opacity:0;transition:opacity .15s;}
.shot-card.done .cb svg{opacity:1;}
.shot-body{flex:1;min-width:0;}
.tags-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;}
.stag{font-size:9px;padding:2px 7px;border-radius:99px;font-weight:500;white-space:nowrap;}
.t-early{background:#E8F4FD;color:#1A5C8A;}
.t-noon{background:#FFF3E0;color:#9A4400;}
.t-aft{background:#EDE7F6;color:#4A2A7A;}
.t-eve{background:#FCE4EC;color:#8A1A3A;}
.t-any{background:#F3F3F3;color:#555;}
.t-launch{background:#FFF8E1;color:#8A5C00;border:1px solid #F0C840;}
.shot-scene{font-size:13px;font-weight:500;line-height:1.4;}
.shot-card.done .shot-scene{color:var(--g);text-decoration:line-through;text-decoration-color:var(--g3);}
.dev-row{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.dtag{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;}
.d-dev{background:#EEF2FF;color:#3A4A9A;}
.d-ori{background:#FFF0F8;color:#8A2A6A;}
.expand-toggle{font-size:10px;color:var(--g);background:none;border:none;cursor:pointer;margin-top:7px;font-family:'Noto Sans SC',sans-serif;display:flex;align-items:center;gap:3px;padding:0;}
.ea{display:inline-block;transition:transform .2s;}
.expand-toggle.open .ea{transform:rotate(90deg);}
.shot-detail{display:none;border-top:1px solid var(--border);}
.shot-detail.open{display:block;}
.det-sec{padding:12px 14px;border-bottom:1px solid var(--border);}
.det-sec:last-child{border-bottom:none;}
.det-label{font-size:9px;font-weight:600;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.det-label::before{content:'';width:2px;height:10px;background:var(--g);border-radius:1px;}
.det-txt{font-size:12px;line-height:1.75;color:var(--ink2);white-space:pre-wrap;}
.audio-box{background:var(--gp);border:1px solid rgba(192,57,90,.18);border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.75;font-family:'Noto Serif SC',serif;white-space:pre-wrap;color:var(--gd);}
.tip-box{background:#FFFBEA;border:1px solid #F0D060;border-radius:8px;padding:8px 11px;font-size:11px;color:#7A5500;line-height:1.6;margin-top:7px;white-space:pre-wrap;}

/* PAGE 2 */
.scripts-library{margin:12px 16px 0;}
.script-video-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:10px;}
.svc-header{padding:14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;transition:background .15s;-webkit-tap-highlight-color:transparent;}
.svc-header:active{background:var(--gp);}
.svc-header.open{background:var(--gp);border-bottom:1px solid var(--border);}
.svc-num{font-family:'DM Mono',monospace;font-size:10px;background:var(--g);color:#fff;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:2px;}
.svc-info{flex:1;min-width:0;}
.svc-title{font-family:'Noto Serif SC',serif;font-size:14px;font-weight:700;line-height:1.4;color:var(--ink);}
.svc-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.svc-tag{font-size:9px;padding:2px 7px;border-radius:99px;background:var(--gp);color:var(--g);border:1px solid rgba(192,57,90,.2);}
.svc-tag.gold{background:var(--goldt);color:var(--gold);border-color:rgba(200,151,58,.3);}
.svc-arr{font-size:11px;color:var(--ink4);transition:transform .2s;flex-shrink:0;margin-top:4px;}
.svc-header.open .svc-arr{transform:rotate(90deg);}
.svc-del{font-size:16px;color:var(--ink4);background:none;border:none;cursor:pointer;padding:2px;flex-shrink:0;line-height:1;}
.svc-body{display:none;padding:0 0 4px;}
.svc-body.open{display:block;}
.svc-positioning{margin:12px 14px 0;background:var(--goldt);border:1px solid rgba(200,151,58,.3);border-radius:8px;padding:9px 12px;font-size:11px;color:#7A5000;line-height:1.6;}
.svc-xhs{margin:10px 14px 0;background:var(--gp);border:1px solid rgba(192,57,90,.18);border-radius:8px;padding:11px 13px;}
.svc-xhs-label{font-size:9px;font-weight:700;color:var(--g);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}
.svc-xhs-text{font-size:12px;line-height:1.75;font-family:'Noto Serif SC',serif;color:var(--gd);white-space:pre-wrap;}
.svc-edittip{margin:10px 14px 0;background:#FFFBEA;border:1px solid #F0D060;border-radius:8px;padding:9px 12px;font-size:11px;color:#7A5500;line-height:1.6;}
.svc-edittip-label{font-size:9px;font-weight:700;color:#9A7000;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.svc-shots{margin:10px 14px 14px;}
.svc-shots-label{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.svc-shots-label::before{content:'';width:2px;height:10px;background:var(--g);border-radius:1px;}
.svc-shot{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px;background:var(--card);}
.svc-shot:last-child{margin-bottom:0;}
.svc-shot-head{padding:10px 12px;display:flex;align-items:flex-start;gap:8px;cursor:pointer;background:var(--bg);-webkit-tap-highlight-color:transparent;}
.svc-shot-head:active{background:var(--gp2);}
.svc-shot-head.open{background:var(--gp);border-bottom:1px solid var(--border);}
.sshot-num{font-family:'DM Mono',monospace;font-size:9px;background:var(--ink2);color:#fff;padding:1px 6px;border-radius:3px;flex-shrink:0;margin-top:2px;}
.svc-shot-head.open .sshot-num{background:var(--g);}
.sshot-info{flex:1;min-width:0;}
.sshot-scene{font-size:12px;font-weight:500;line-height:1.4;color:var(--ink);}
.sshot-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.sshot-loc{font-size:9px;padding:1px 6px;border-radius:4px;background:#EEF2FF;color:#3A4A9A;font-family:'DM Mono',monospace;}
.sshot-time{font-size:9px;padding:1px 6px;border-radius:99px;font-weight:500;}
.sshot-arr{font-size:10px;color:var(--ink4);transition:transform .2s;flex-shrink:0;margin-top:3px;}
.svc-shot-head.open .sshot-arr{transform:rotate(90deg);}
.svc-shot-detail{display:none;padding:10px 12px;}
.svc-shot-detail.open{display:block;}
.ssd-sec{margin-bottom:10px;}
.ssd-sec:last-child{margin-bottom:0;}
.ssd-label{font-size:9px;font-weight:600;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.ssd-label::before{content:'';width:2px;height:9px;background:var(--g);border-radius:1px;}
.ssd-txt{font-size:12px;line-height:1.75;color:var(--ink2);white-space:pre-wrap;}
.ssd-audio{background:var(--gp);border:1px solid rgba(192,57,90,.18);border-radius:7px;padding:9px 11px;font-size:12px;line-height:1.75;font-family:'Noto Serif SC',serif;white-space:pre-wrap;color:var(--gd);}
.ssd-tip{background:#FFFBEA;border:1px solid #F0D060;border-radius:7px;padding:7px 10px;font-size:11px;color:#7A5500;line-height:1.6;margin-top:6px;white-space:pre-wrap;}
.script-status-row{display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap;}
.script-status-btn{font-size:9px;padding:3px 9px;border-radius:99px;border:1.5px solid var(--border);background:var(--card);color:var(--ink3);cursor:pointer;font-family:'Noto Sans SC',sans-serif;transition:all .15s;white-space:nowrap;}
.script-status-btn.active-pending{background:#F3F3F3;border-color:#999;color:#444;}
.script-status-btn.active-shooting{background:#E3F2FD;border-color:var(--blue);color:var(--blue);}
.script-status-btn.active-editing{background:var(--amberp);border-color:var(--amber);color:var(--amber);}
.script-status-btn.active-published{background:var(--gp);border-color:var(--g);color:var(--g);}

/* Import module */
.import-wrap{margin:14px 16px 0;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.import-header{padding:12px 14px;background:var(--gp);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:3px;}
.import-title{font-size:13px;font-weight:600;color:var(--g);}
.import-hint{font-size:10px;color:var(--ink3);}
.import-body{padding:12px 14px;}
.import-file-area{border:2px dashed var(--border2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg);}
.import-file-area:active{border-color:var(--g);background:var(--gp);}
.import-file-icon{font-size:28px;margin-bottom:6px;}
.import-file-text{font-size:12px;color:var(--ink3);}
.import-preview{padding:0 14px 14px;}
.import-preview:empty{display:none;}
.preview-card{background:var(--gp);border:1.5px solid var(--g);border-radius:10px;padding:12px 14px;}
.preview-title{font-size:14px;font-weight:600;color:var(--g);margin-bottom:4px;}
.preview-meta{font-size:11px;color:var(--ink3);margin-bottom:10px;}
.preview-shots-count{font-size:11px;color:var(--ink2);background:var(--card);border-radius:6px;padding:6px 10px;margin-bottom:10px;}
.preview-actions{display:flex;gap:8px;}
.btn-import-confirm{flex:2;padding:10px;background:var(--g);color:#fff;border:none;border-radius:8px;font-family:'Noto Sans SC',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.btn-import-cancel{flex:1;padding:10px;background:none;color:var(--ink2);border:1.5px solid var(--border);border-radius:8px;font-family:'Noto Sans SC',sans-serif;font-size:13px;cursor:pointer;}

/* PAGE 3 — CALENDAR */
.cal-wrap{margin:14px 16px 0;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:700;}
.cal-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;color:var(--ink2);transition:all .15s;}
.cal-btn:active{background:var(--gp);border-color:var(--g);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{text-align:center;font-size:10px;font-weight:600;color:var(--ink3);padding:6px 0;letter-spacing:.05em;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-size:13px;position:relative;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent;}
.cal-day:empty{cursor:default;}
.cal-day.today{background:var(--gp);color:var(--g);font-weight:700;}
.cal-day.has-post{font-weight:600;}
.cal-day .dot{width:5px;height:5px;border-radius:99px;background:var(--g);position:absolute;bottom:4px;}
.cal-day.selected{background:var(--g);color:#fff;}
.cal-day.selected .dot{background:#fff;}
.cal-day:not(:empty):hover{background:var(--gp);}
.cal-detail{margin-top:12px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.cal-detail-header{padding:12px 14px;background:var(--gp);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cal-detail-header h3{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:700;}
.btn-add-post{background:var(--g);color:#fff;border:none;border-radius:99px;padding:6px 14px;font-size:11px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;}
.post-list{padding:4px 0;}
.post-item{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
.post-item:last-child{border-bottom:none;}
.post-status{width:8px;height:8px;border-radius:99px;flex-shrink:0;margin-top:5px;}
.st-draft{background:var(--ink4);}
.st-ready{background:var(--gold);}
.st-published{background:var(--g);}
.post-info{flex:1;}
.post-title{font-size:13px;font-weight:500;line-height:1.4;}
.post-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.post-tag{font-size:9px;padding:1px 6px;border-radius:99px;background:var(--gp);color:var(--g);}
.post-tag.douyin{background:#FFE8E8;color:#CC0000;}
.post-tag.xiaohongshu{background:#FFE8F0;color:#CC0055;}
.post-del{font-size:16px;color:var(--ink4);background:none;border:none;cursor:pointer;padding:0;line-height:1;flex-shrink:0;}
.empty-cal{padding:30px;text-align:center;color:var(--ink3);font-size:13px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border-radius:var(--r) var(--r) 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:20px 20px 40px;}
.modal h2{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;margin-bottom:16px;}
.form-group{margin-bottom:14px;}
.form-group label{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.08em;display:block;margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Noto Sans SC',sans-serif;font-size:14px;color:var(--ink);background:var(--card);outline:none;transition:border-color .15s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--g);}
.form-group textarea{min-height:70px;resize:none;}
.platform-btns{display:flex;gap:8px;}
.plt-btn{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;background:var(--card);color:var(--ink2);transition:all .15s;text-align:center;}
.plt-btn.active.douyin{background:#FFE8E8;border-color:#CC0000;color:#CC0000;}
.plt-btn.active.xhs{background:#FFE8F0;border-color:#CC0055;color:#CC0055;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.btn-cancel{flex:1;padding:12px;border:1.5px solid var(--border);border-radius:var(--r2);background:none;font-size:13px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;color:var(--ink2);}

<script>
function store(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k,d=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function fmtDate(d){return d.toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});}
function switchPage(btn){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('page-'+btn.dataset.page).classList.add('active');
  window.scrollTo(0,0);
}

function getTodayTimeKey(){
  const h=new Date().getHours();
  if(h<11)return'early';if(h<14)return'noon';if(h<18)return'aft';return'eve';
}
function renderTodayBanner(){
  const timeKey=getTodayTimeKey();
  const timeLabels={early:'早晨',noon:'上午/中午',aft:'下午',eve:'傍晚/夜晚'};
  const allShots=LOCATIONS.flatMap(l=>l.shots);
  const todayShots=allShots.filter(s=>s.time===timeKey||s.time==='any');
  const done=todayShots.filter(s=>load('s_'+s.id)===1).length;
  const remaining=todayShots.length-done;
  document.getElementById('todayBanner').innerHTML=`
    <div class="today-banner" onclick="setTodayFilter()">
      <div class="today-banner-left">
        <div class="today-banner-title">今日素材任务</div>
        <div class="today-banner-sub">当前时段：${timeLabels[timeKey]} · 点击查看</div>
      </div>
      <div class="today-banner-count">${remaining}<small>待拍</small></div>
    </div>`;
}
function setTodayFilter(){currentFilter='today';renderFilterBar();renderShots();}
function timeClass(t){return{early:'t-early',noon:'t-noon',aft:'t-aft',eve:'t-eve',any:'t-any'}[t]||'t-any';}
function renderFilterBar(){
  const bar=document.getElementById('filterBar');
  bar.innerHTML=filterDef.map(f=>`<button class="chip${f.key===currentFilter?' active':''}" data-f="${f.key}">${f.label}</button>`).join('');
  bar.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{currentFilter=c.dataset.f;renderFilterBar();renderShots();}));
}
function renderShots(){
  shotIdx=0;
  const content=document.getElementById('shotsContent');
  content.innerHTML='';
  const todayKey=getTodayTimeKey();
  LOCATIONS.forEach(loc=>{
    const filtered=loc.shots.filter(s=>{
      if(currentFilter==='all')return true;
      if(currentFilter==='launch')return s.launch;
      if(currentFilter==='today')return s.time===todayKey||s.time==='any';
      return s.time===currentFilter;
    });
    if(!filtered.length)return;
    const grp=document.createElement('div');
    grp.className='loc-group';
    const doneCnt=filtered.filter(s=>load('s_'+s.id)===1).length;
    grp.innerHTML=`
      <div class="loc-head" data-loc="${loc.id}">
        <div class="loc-icon2">${loc.icon}</div>
        <div class="loc-info"><div class="loc-name">${loc.name}</div><div class="loc-sub">${loc.sub}</div></div>
        <div class="loc-badge" id="lb_${loc.id}">${doneCnt}/${filtered.length}</div>
        <div class="loc-arr">▶</div>
      </div>
      <div class="shots-list" id="sl_${loc.id}"></div>`;
    const sl=grp.querySelector('.shots-list');
    const lh=grp.querySelector('.loc-head');
    lh.addEventListener('click',()=>{sl.classList.toggle('open');lh.classList.toggle('open');});
    filtered.forEach(s=>{
      shotIdx++;
      const isDone=load('s_'+s.id)===1;
      const card=document.createElement('div');
      card.className='shot-card'+(isDone?' done':'');
      card.innerHTML=`
        <div class="shot-head">
          <div class="cb"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5L4.5 8.5L9.5 2.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="shot-body">
            <div class="tags-row">
              <span class="stag ${timeClass(s.time)}">${s.tName}</span>
              ${s.launch?'<span class="stag t-launch">⭐ 第一条必拍</span>':''}
              <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--ink4);background:var(--bg);padding:2px 6px;border-radius:3px;">#${String(shotIdx).padStart(2,'0')}</span>
            </div>
            <div class="shot-scene">${s.scene}</div>
            <div class="dev-row"><span class="dtag d-dev">📷 ${s.dev}</span><span class="dtag d-ori">${s.ori}</span></div>
            <button class="expand-toggle" data-id="${s.id}"><span class="ea">▶</span> 展开详情</button>
          </div>
        </div>
        <div class="shot-detail" id="sd_${s.id}">
          <div class="det-sec"><div class="det-label">画面内容 & 拍摄角度</div><div class="det-txt">${s.visual}</div></div>
          <div class="det-sec"><div class="det-label">台词 / 字幕 / 声音</div><div class="audio-box">${s.audio}</div>${s.tip?`<div class="tip-box">💡 ${s.tip}</div>`:''}</div>
        </div>`;
      card.querySelector('.cb').addEventListener('click',e=>{
        e.stopPropagation();
        const done=!card.classList.contains('done');
        card.classList.toggle('done',done);
        store('s_'+s.id,done?1:0);
        updateProgress();
        updateLocBadge(loc.id,filtered);
        toast(done?'已记录 ✓':'已取消');
      });
      card.querySelector('.expand-toggle').addEventListener('click',e=>{
        e.stopPropagation();
        const det=document.getElementById('sd_'+s.id);
        const btn=card.querySelector('.expand-toggle');
        const open=det.classList.toggle('open');
        btn.classList.toggle('open',open);
        btn.innerHTML=`<span class="ea" style="${open?'transform:rotate(90deg)':''}">▶</span> ${open?'收起详情':'展开详情'}`;
      });
      sl.appendChild(card);
    });
    content.appendChild(grp);
  });
  updateProgress();
}
function updateLocBadge(locId,filtered){
  const el=document.getElementById('lb_'+locId);
  if(!el)return;
  el.textContent=`${filtered.filter(s=>load('s_'+s.id)===1).length}/${filtered.length}`;
}
function updateProgress(){
  const allShots=LOCATIONS.flatMap(l=>l.shots);
  const total=allShots.length,done=allShots.filter(s=>load('s_'+s.id)===1).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progNum').textContent=`${done} / ${total}`;
}

function renderScriptsList(){
  const scripts=load('cp_saved_scripts',[]);
  const el=document.getElementById('scriptsList');
  if(!scripts.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">🎬</div><div>还没有脚本</div><div style="margin-top:6px;font-size:11px;color:var(--ink4);">从上方导入 JSON 文件，或在 Claude 对话里生成脚本后上传</div></div>';
    return;
  }
  el.innerHTML=scripts.map((s,idx)=>renderScriptCard(s,idx)).join('');
}

function renderScriptCard(s,idx){
  const d=s.data||{};
  const shots=d.shots||[];
  const statusKey=load('cp_script_status_'+s.id,'pending');
  const statusMap={pending:{label:'待拍',cls:'active-pending'},shooting:{label:'拍摄中',cls:'active-shooting'},editing:{label:'剪辑中',cls:'active-editing'},published:{label:'已发布',cls:'active-published'}};
  const statusBtns=Object.entries(statusMap).map(([k,v])=>`<button class="script-status-btn${statusKey===k?' '+v.cls:''}" onclick="event.stopPropagation();setScriptStatus('${s.id}',this,'${k}')">${v.label}</button>`).join('');
  return`<div class="script-video-card" id="svc_${s.id}">
    <div class="svc-header" onclick="toggleScriptCard('${s.id}',this)">
      <div class="svc-num">#${String(idx+1).padStart(2,'0')}</div>
      <div class="svc-info">
        <div class="svc-title">${d.title||s.idea||'未命名脚本'}</div>
        <div class="svc-meta">
          <span class="svc-tag">${shots.length} 个镜头</span>
          ${d.duration?`<span class="svc-tag">${d.duration}`+`</span>`:''}
          ${d.positioning?`<span class="svc-tag gold">${d.positioning.split(/[，,]/)[0]}</span>`:''}
        </div>
        <div class="script-status-row">${statusBtns}</div>
      </div>
      <button class="svc-del" onclick="event.stopPropagation();delScriptConfirm('${s.id}')">×</button>
      <div class="svc-arr">▶</div>
    </div>
    <div class="svc-body" id="svcb_${s.id}">
      ${d.positioning?`<div class="svc-positioning">📍 ${d.positioning}</div>`:''}
      ${d.editTip?`<div class="svc-edittip"><div class="svc-edittip-label">✂️ 剪辑提示</div>${d.editTip}</div>`:''}
      ${shots.length?`<div class="svc-shots"><div class="svc-shots-label">镜头脚本（${shots.length} 个）</div>${shots.map(sh=>renderShotDetail(sh,s.id)).join('')}</div>`:''}
      ${d.xhsCopy?`<div class="svc-xhs"><div class="svc-xhs-label">小红书文案</div><div class="svc-xhs-text">${d.xhsCopy}</div></div>`:''}
      <div style="height:14px;"></div>
    </div>

}

  const locMeta=sh.locationId&&LOC_META[sh.locationId]?LOC_META[sh.locationId]:null;

  return`<div class="svc-shot">
    <div class="svc-shot-head" onclick="toggleShotDetail('${scriptId}_${sh.no}',this)">

          ${timeLabel?`<span class="stag sshot-time ${tc}">${timeLabel}</span>`:''}
          ${sh.device?`<span class="dtag d-dev" style="font-size:9px;">📷 ${sh.device}</span>`:''}
          ${sh.orient?`<span class="dtag d-ori" style="font-size:9px;">${sh.orient}</span>`:''}
        </div>
      </div>
      <div class="sshot-arr">▶</div>
    </div>
    <div class="svc-shot-detail" id="ssd_${scriptId}_${sh.no}">
      ${sh.visual?`<div class="ssd-sec"><div class="ssd-label">画面 & 拍摄角度</div><div class="ssd-txt">${sh.visual}</div></div>`:''}
      ${sh.audio?`<div class="ssd-sec"><div class="ssd-label">台词 / 字幕 / 声音</div><div class="ssd-audio">${sh.audio}</div></div>`:''}

function setScriptStatus(id,btn,status){
  store('cp_script_status_'+id,status);
  const m={pending:'active-pending',shooting:'active-shooting',editing:'active-editing',published:'active-published'};
  btn.closest('.script-status-row').querySelectorAll('.script-status-btn').forEach(b=>Object.values(m).forEach(c=>b.classList.remove(c)));
  btn.classList.add(m[status]);
  toast({pending:'待拍',shooting:'拍摄中',editing:'剪辑中',published:'已发布'}[status]+' ✓');
}
function toggleScriptCard(id,header){const body=document.getElementById('svcb_'+id);const open=body.classList.toggle('open');header.classList.toggle('open',open);}
function toggleShotDetail(uid,header){const det=document.getElementById('ssd_'+uid);const open=det.classList.toggle('open');header.classList.toggle('open',open);}
function delScriptConfirm(id){
  let scripts=load('cp_saved_scripts',[]);
  scripts=scripts.filter(s=>s.id!=id);
  store('cp_saved_scripts',scripts);
  renderScriptsList();
  toast('脚本已删除');
}

// ── IMPORT MODULE ──────────────────────────────────────
let pendingImport=null;
function handleImportFile(input){
  const file=input.files[0];
  if(!file)return;
  document.getElementById('importFileName').textContent=file.name;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const raw=e.target.result.replace(/```json|```/g,'').trim();
      const data=JSON.parse(raw);
      pendingImport=data;
      showImportPreview(data);
    }catch(err){
      document.getElementById('importPreview').innerHTML=`<div style="color:var(--red);font-size:12px;padding:8px 0;">❌ 文件格式有误，请上传有效的 JSON 文件</div>`;
      pendingImport=null;
    }
  };
  reader.readAsText(file);
  input.value='';
}
function showImportPreview(data){
  const shots=data.shots||[];
  const assignable=shots.filter(s=>s.locationId&&s.time).length;
  document.getElementById('importPreview').innerHTML=`<div class="preview-card">
    <div class="preview-title">${data.title||'未命名脚本'}</div>
    <div class="preview-meta">${data.positioning||''} ${data.duration?'· '+data.duration:''}</div>
    <div class="preview-shots-count">共 ${shots.length} 个镜头，其中 <strong style="color:var(--g)">${assignable} 个</strong>已分配地点和时间，将自动添加到拍摄清单</div>
    <div class="preview-actions">
      <button class="btn-import-cancel" onclick="cancelImport()">取消</button>
      <button class="btn-import-confirm" onclick="confirmImport()">确认导入</button>
    </div>
  </div>`;
}
function cancelImport(){
  pendingImport=null;
  document.getElementById('importPreview').innerHTML='';
  document.getElementById('importFileName').textContent='点击上传 JSON 脚本文件';
}
function confirmImport(){
  if(!pendingImport)return;
  const data=pendingImport;
  const scripts=load('cp_saved_scripts',[]);
  const newScript={id:Date.now(),idea:data.title||'',date:new Date().toLocaleDateString('zh-CN'),data:data};
  scripts.unshift(newScript);
  store('cp_saved_scripts',scripts);
  const shots=data.shots||[];
  let added=0;
  shots.forEach(sh=>{
    if(!sh.locationId||!sh.time)return;
    const loc=LOCATIONS.find(l=>l.id===sh.locationId);
    if(!loc)return;
    const shotId='imp_'+newScript.id+'_'+sh.no;
    if(loc.shots.find(s=>s.id===shotId))return;
    loc.shots.push({id:shotId,scene:sh.scene||'',time:sh.time,tName:TIME_LABELS[sh.time]||sh.time,launch:false,dev:sh.device||'手机',ori:sh.orient||'竖屏',visual:sh.visual||'',audio:sh.audio||'',tip:sh.tip||''});
    added++;
  });
  renderScriptsList();renderFilterBar();renderShots();
  cancelImport();
  toast(`脚本已导入，${added} 个镜头已添加到拍摄清单 ✓`);
}

// 预置脚本（首次注入）
const PRESET_SCRIPTS=SCRIPTS.map(s=>({id:'preset_'+s.id,idea:s.title,date:'2025/1/1',data:{title:s.title,positioning:s.positioning,duration:s.duration,editTip:s.editTip,xhsCopy:s.xhsCopy,shots:s.shots.map((sh,i)=>({no:sh.no||i+1,scene:sh.scene,time:sh.time||'any',device:sh.dev,orient:sh.ori,visual:sh.visual,audio:sh.audio,tip:sh.tip}))}}));
if(!load('cp_saved_scripts')){store('cp_saved_scripts',PRESET_SCRIPTS);}

function renderScripts(){renderScriptsList();}

// ── PAGE 3: CALENDAR ──────────────────────────────────
let calDate=new Date();
let selectedDate=null;
let selectedPlatforms=[];

function changeMonth(d){calDate.setMonth(calDate.getMonth()+d);renderCal();}

function renderCal(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('calMonth').textContent=`${y}年${m+1}月`;
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  ['一','二','三','四','五','六','日'].forEach(d=>{const el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);});
  const first=new Date(y,m,1).getDay();
  const adj=first===0?6:first-1;
  for(let i=0;i<adj;i++){const el=document.createElement('div');el.className='cal-day';grid.appendChild(el);}
  const days=new Date(y,m+1,0).getDate();
  const today=new Date();
  const posts=load('cp_cal_posts',{});
  for(let d=1;d<=days;d++){
    const el=document.createElement('div');el.className='cal-day';el.textContent=d;
    const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate())el.classList.add('today');
    if(posts[key]&&posts[key].length)el.classList.add('has-post');
    if(selectedDate===key)el.classList.add('selected');
    const dot=document.createElement('div');dot.className='dot';
    if(posts[key]&&posts[key].length)el.appendChild(dot);
    el.addEventListener('click',()=>{selectedDate=key;renderCal();renderCalDetail(key);});
    grid.appendChild(el);
  }
}

function renderCalDetail(key){
  const posts=load('cp_cal_posts',{})[key]||[];
  const d=new Date(key);
  document.getElementById('calDetailTitle').textContent=fmtDate(d);
  const el=document.getElementById('calPosts');
  if(!posts.length){el.innerHTML='<div class="empty-cal">这一天还没有发布计划<br><small>点击右上角「+ 添加」</small></div>';return;}
  el.innerHTML=`<div class="post-list">${posts.map(p=>`
    <div class="post-item">
      <div class="post-status st-${p.status}"></div>
      <div class="post-info">
        <div class="post-title">${p.title}</div>
        <div class="post-tags">
          ${p.platforms.includes('douyin')?'<span class="post-tag douyin">抖音</span>':''}
          ${p.platforms.includes('xhs')?'<span class="post-tag xiaohongshu">小红书</span>':''}
          <span class="post-tag">${{draft:'草稿',ready:'待发布',published:'已发布'}[p.status]}</span>
        </div>
        ${p.note?`<div style="font-size:11px;color:var(--ink3);margin-top:3px;">${p.note}</div>`:''}
      </div>
      <button class="post-del" onclick="delPost('${key}',${p.id})">×</button>
    </div>`).join('')}</div>`;
}

function openModal(){
  if(!selectedDate){toast('请先选择日期');return;}
  document.getElementById('postTitle').value='';
  document.getElementById('postStatus').value='draft';
  document.getElementById('postNote').value='';
  selectedPlatforms=[];
  document.querySelectorAll('.plt-btn').forEach(b=>b.classList.remove('active'));
  const scripts=load('cp_saved_scripts',[]);
  const sel=document.getElementById('postScriptPick');
  sel.innerHTML='<option value="">— 手动输入标题 —</option>'+scripts.map(s=>`<option value="${(s.data&&s.data.title)||s.idea||''}">${(s.data&&s.data.title)||s.idea||'未命名脚本'}</option>`).join('');
  document.getElementById('modalOverlay').classList.add('open');
}
function onScriptPick(sel){if(sel.value)document.getElementById('postTitle').value=sel.value;}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function togglePlatform(btn){
  const plt=btn.dataset.plt;btn.classList.toggle('active');
  if(selectedPlatforms.includes(plt))selectedPlatforms=selectedPlatforms.filter(p=>p!==plt);
  else selectedPlatforms.push(plt);
}
function savePost(){
  const title=document.getElementById('postTitle').value.trim();
  if(!title){toast('请输入标题');return;}
  const posts=load('cp_cal_posts',{});
  if(!posts[selectedDate])posts[selectedDate]=[];
  posts[selectedDate].push({id:Date.now(),title,status:document.getElementById('postStatus').value,platforms:selectedPlatforms,note:document.getElementById('postNote').value.trim()});
  store('cp_cal_posts',posts);
  closeModal();renderCal();renderCalDetail(selectedDate);toast('已添加 ✓');
}
function delPost(dateKey,id){
  const posts=load('cp_cal_posts',{});
  if(posts[dateKey])posts[dateKey]=posts[dateKey].filter(p=>p.id!=id);
  store('cp_cal_posts',posts);renderCal();renderCalDetail(dateKey);toast('已删除');
}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ── PAGE 4: NOTES ──────────────────────────────────────
let noteType='idea';
const noteTypeMap={idea:{label:'选题灵感',cls:'nb-idea'},obs:{label:'现场观察',cls:'nb-obs'},feel:{label:'感受',cls:'nb-feel'},other:{label:'两人互动',cls:'nb-other'}};
function setNoteType(btn){document.querySelectorAll('.ntbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');noteType=btn.dataset.type;}
function saveNote(){
  const text=document.getElementById('noteInput').value.trim();
  if(!text){toast('请先输入内容');return;}
  const notes=load('cp_notes',[]);
  notes.unshift({id:Date.now(),text,type:noteType,date:new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})});
  store('cp_notes',notes);
  document.getElementById('noteInput').value='';
  renderNotes();toast('已记下 ✓');
}
function renderNotes(){
  const q=(document.getElementById('noteSearch')?.value||'').trim().toLowerCase();
  let notes=load('cp_notes',[]);
  if(q)notes=notes.filter(n=>n.text.toLowerCase().includes(q));
  const el=document.getElementById('notesList');
  if(!notes.length){el.innerHTML='<div class="empty"><div class="empty-icon">✏️</div>'+(q?'没有匹配的灵感':'随手记下两人的互动，素材就在生活里')+'</div>';return;}
  el.innerHTML=notes.map(n=>`
    <div class="note-card">
      <div class="note-type-badge ${noteTypeMap[n.type]?.cls||'nb-other'}">${noteTypeMap[n.type]?.label||'其他'}</div>
      <div class="note-text">${n.text}</div>
      <div class="note-date">${n.date}</div>
      <button class="note-send-btn" onclick="openCopyModal(${n.id})">✦ 发给 Claude</button>
      <button class="note-del" onclick="delNote(${n.id})">×</button>
    </div>`).join('');
}
let _copyNoteId=null;
function openCopyModal(id){
  const notes=load('cp_notes',[]);
  const n=notes.find(n=>n.id===id);
  if(!n)return;
  _copyNoteId=id;
  const typeLabel=noteTypeMap[n.type]?.label||'其他';
  const text=`【情侣账号 灵感速记】\n类型：${typeLabel}\n记录时间：${n.date}\n\n内容：\n${n.text}\n\n---\n请基于以上灵感，帮我生成一条适合抖音/小红书的短视频脚本。背景：我们是住在卡萨布兰卡的情侣，账号定位是记录两人真实日常的反差喜剧内容。`;
  document.getElementById('copyModalText').textContent=text;
  document.getElementById('copyModalOverlay').classList.add('open');
}
function closeCopyModal(){document.getElementById('copyModalOverlay').classList.remove('open');}
function doCopy(){
  const text=document.getElementById('copyModalText').textContent;
  navigator.clipboard.writeText(text).then(()=>{toast('已复制，粘贴到 Claude 对话框 ✓');closeCopyModal();}).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    toast('已复制 ✓');closeCopyModal();
  });
}
document.getElementById('copyModalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeCopyModal();});
function delNote(id){let notes=load('cp_notes',[]);notes=notes.filter(n=>n.id!=id);store('cp_notes',notes);renderNotes();}

renderTodayBanner();renderFilterBar();renderShots();renderScripts();renderCal();renderNotes();
</script>
</body>
